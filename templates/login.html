<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login · Indicador de Cobros</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body {
    background: linear-gradient(135deg, #0d2840 0%, #1e4b73 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .login-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.25); padding: 36px; max-width: 420px; width: 92%; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo i { color: #0d2840; font-size: 2.6rem; }
  .logo h1 { color: #0d2840; font-weight: 700; font-size: 1.4rem; margin: 8px 0 0; letter-spacing: .3px; }
  .logo .sub { color: #6b7886; font-size: .82rem; margin-top: 4px; }
  .form-control { padding: 12px 14px; font-size: .95rem; border-radius: 8px; border: 1px solid #d8dee5; }
  .form-control:focus { border-color: #1e4b73; box-shadow: 0 0 0 .15rem rgba(30,75,115,.15); }
  .form-label { font-size: .82rem; font-weight: 600; color: #5a6b7d; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .btn-login { background: #0d2840; color: #fff; padding: 12px; border-radius: 8px; font-weight: 600; letter-spacing: .3px; width: 100%; border: none; transition: all .15s; }
  .btn-login:hover { background: #1e4b73; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .footer-note { text-align: center; color: #6b7886; font-size: .75rem; margin-top: 18px; }
  .alert-danger { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; border-radius: 8px; padding: 10px 14px; font-size: .85rem; }
  .input-group-text { background: #f3f5f8; border: 1px solid #d8dee5; border-right: none; }
  .input-group .form-control { border-left: none; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <i class="bi bi-cash-stack"></i>
    <h1>Indicador de Cobros</h1>
    <div class="sub">Grupo Rapid</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}"><i class="bi bi-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" autocomplete="off">
    <div class="mb-3">
      <label class="form-label">Usuario Odoo</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        <input type="email" name="username" class="form-control" placeholder="ejemplo@gruporapid.com" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</button>
  </form>

  <div class="footer-note">
    Use sus credenciales de Odoo · <a href="https://pestbuster.odoo.com" target="_blank" style="color:#1e4b73">pestbuster.odoo.com</a>
  </div>
</div>

</body>
</html>
